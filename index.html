<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calsi</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
    }

    .hero {
      background: linear-gradient(135deg, #667eea, #764ba2, #6dd5ed);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .calculator {
      backdrop-filter: blur(15px);
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255,255,255,0.2);
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      width: 320px;
      text-align: center;
      color: #fff;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 5px 0;
      border-radius: 8px;
      border: none;
      outline: none;
      font-size: 14px;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 10px;
    }

    button {
      padding: 10px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: linear-gradient(135deg, #ff7e5f, #feb47b);
      color: white;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
    }

    #result {
      margin-top: 15px;
      font-size: 18px;
    }

    .control-btn {
      margin-top: 8px;
      background: #222;
    }
  </style>
</head>

<body>

<div class="hero">
  <div class="calculator">
    <h2>Calculator</h2>

    <div id="inputContainer">
      <input type="number" class="numInput" placeholder="Enter number">
    </div>

    <button class="control-btn" onclick="addInput()">Add Number</button>
    <button class="control-btn" onclick="removeInput()">Remove Number</button>
    <button class="control-btn" onclick="clearInputs()">Clear All</button>

    <div class="buttons">
      <button onclick="calculate('add')">+</button>
      <button onclick="calculate('sub')">-</button>
      <button onclick="calculate('mul')">*</button>
      <button onclick="calculate('div')">/</button>
      <button onclick="calculate('avg')">AVG</button>
      <button onclick="calculate('min')">MIN</button>
      <button onclick="calculate('max')">MAX</button>
    </div>

    <p id="result">Result: </p>
  </div>
</div>

<script>

function addInput() {
  let container = document.getElementById("inputContainer");

  if (document.querySelectorAll(".numInput").length >= 10) {
    alert("Maximum 10 inputs allowed!");
    return;
  }

  let input = document.createElement("input");
  input.type = "number";
  input.className = "numInput";
  input.placeholder = "Enter number";

  container.appendChild(input);
}

function removeInput() {
  let container = document.getElementById("inputContainer");
  let inputs = document.querySelectorAll(".numInput");

  if (inputs.length <= 1) {
    alert("At least one input is required!");
    return;
  }

  container.removeChild(inputs[inputs.length - 1]);
}

function clearInputs() {
  let inputs = document.querySelectorAll(".numInput");

  for (let i = 0; i < inputs.length; i++) {
    inputs[i].value = "";
  }

  document.getElementById("result").innerText = "Result: ";
}

function getNumbers() {
  let inputs = document.querySelectorAll(".numInput");
  let nums = [];

  for (let i = 0; i < inputs.length; i++) {
    let value = inputs[i].value.trim();

    if (value === "") {
      alert("Please fill all inputs!");
      return null;
    }

    let num = Number(value);

    if (isNaN(num)) {
      alert("Only valid numbers allowed!");
      return null;
    }

    nums.push(num);
  }

  return nums;
}

function calculate(op) {
  let nums = getNumbers();
  if (!nums) return;

  let result;

  if (op === "add") {
    result = 0;
    for (let i = 0; i < nums.length; i++) {
      result += nums[i];
    }
  }

  else if (op === "sub") {
    result = nums[0];
    for (let i = 1; i < nums.length; i++) {
      result -= nums[i];
    }
  }

  else if (op === "mul") {
    result = 1;
    for (let i = 0; i < nums.length; i++) {
      result *= nums[i];
    }
  }

  else if (op === "div") {
    result = nums[0];
    for (let i = 1; i < nums.length; i++) {
      if (nums[i] === 0) {
        alert("Cannot divide by zero!");
        return;
      }
      result /= nums[i];
    }
  }

  else if (op === "avg") {
    let sum = 0;
    for (let i = 0; i < nums.length; i++) {
      sum += nums[i];
    }
    result = sum / nums.length;
  }

  else if (op === "min") {
    result = nums[0];
    for (let i = 1; i < nums.length; i++) {
      if (nums[i] < result) result = nums[i];
    }
  }

  else if (op === "max") {
    result = nums[0];
    for (let i = 1; i < nums.length; i++) {
      if (nums[i] > result) result = nums[i];
    }
  }

  document.getElementById("result").innerText = "Result: " + result;
}

</script>

</body>
</html>
