<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calsi</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
    }

    .hero {
      background: linear-gradient(135deg, #667eea, #764ba2, #6dd5ed);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .calculator {
      backdrop-filter: blur(15px);
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255,255,255,0.2);
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      width: 300px;
      text-align: center;
      color: #fff;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
      outline: none;
      font-size: 14px;
      background: rgba(255,255,255,0.9);
    }

    .buttons {
      display: grid;
    grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
      gap: 10px;
    }

    button {
      padding: 12px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: linear-gradient(135deg, #ff7e5f, #feb47b);
      color: white;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
    }

    #result {
      margin-top: 15px;
      font-size: 18px;
    }
  </style>
</head>

<body>

<div class="hero">
  <div class="calculator">
    <h2>Calculator</h2>

    <input type="text" id="numbers" placeholder="Enter up to 10 numbers (e.g. 2,5,8,10)">

    <div class="buttons">
      <button onclick="calculate('add')">+</button>
      <button onclick="calculate('sub')">-</button>
      <button onclick="calculate('mul')">*</button>
      <button onclick="calculate('div')">/</button>
      <button onclick="calculate('avg')">AVG</button>
      <button onclick="calculate('min')">MIN</button>
      <button onclick="calculate('max')">MAX</button>

    </div>

    <p id="result">Result: </p>
  </div>
</div>

<script>
function getNumbers() { 
    let input = document.getElementById("numbers").value; 
    let nums = input.split(",").map(n => Number(n.trim())); 
    if (nums.length > 10) { alert("Maximum 10 numbers allowed!"); 
    return null; } 
    if (nums.some(isNaN)) { alert("Please enter valid numbers!"); 
    return null; } 
    return nums; }

function calculate(op) {
  let nums = getNumbers();
  if (!nums) return;

  let result = nums[0]; 
  let sum = nums[0]; 

  for (let i = 1; i < nums.length; i++) {
    if(op === "avg"){
        sum += nums[i];
        result = sum /nums.length;
    }
    else if (op === 'add') {
      result += nums[i];
    } 
    else if (op === "sub") {
      result -= nums[i];
    } 
    else if (op === "mul") {
      result *= nums[i];
    } 
    else if (op === "div") {
      if (nums[i] === 0) {
        alert("Cannot divide by zero!");
        return;
      }
      result /= nums[i];
    }
    else if (op ==="min"){
        result = Math.min(result, nums[i]);
    }
    else if (op === "max"){
        result = Math.max(result, nums[i]);
    }
  }

  document.getElementById("result").innerText = "Result: " + result;
}
